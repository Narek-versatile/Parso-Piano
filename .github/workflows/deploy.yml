name: Deploy to GitHub Pages

# Note: the github-pages environment only allows deploys from the repo's
# default branch. Both branches are listed so deploys work whether the
# default stays claude/piano-note-visualizer-1zbsga or moves to main.
on:
  push:
    branches: [main, claude/piano-note-visualizer-1zbsga]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # deploy-pages requires the github-pages environment: the Pages service
    # validates the OIDC token's environment claim and rejects the deployment
    # without it ("Deployment failed, try again later").
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
